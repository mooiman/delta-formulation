# Logging = "matrix"  # "iterations", "matrix"

[Boundary] # north, east, south, west
    bc_type = ["borsboom", "borsboom", "borsboom", "borsboom"] # Type "borsboom", "no_slip", "free_slip", "mooiman" 
    bc_vars = ["q", "zeta", "q", "q"]
    bc_vals = [0.0, 0.0, 0.0, 1.0]
    treg = 150.0                                  # Regularization time boundary signal
    eps_bc_corr = 1.0e-2

[Domain]
    mesh_file = "geometry/meander_constant_dx_5_coarse_reg_net.nc"
    bed_level_file = "geometry/meander_constant_dx_5_coarse_river.dep"
    
[Initial]
    ini_vars = ["zeta_constant"]
    gauss_amp = 0.1 # amplitude of the gaussian hump
    gauss_mu = 0.0    # location of the top of the gaussian hump
    gauss_sigma = 350.0    # width of the gaussian hump

[Numerics]
    dt = 60.0                                     # Time step size [s], if dt == 0: then stationary problem
    iter_max = 25                                 # Maximum number of nonlinear iterations
    theta = 0.501                                 # Implicitness factor (0.5 <= theta <= 1.0)
    regularization_init = true
    regularization_iter = false
    regularization_time = true
    eps_newton = 1.0e-12
    eps_bicgstab = 1.0e-6

[Output]
    dt_his = 0.01   # [s]
    dt_map = 0.01   # [s] 
    dt_screen = 300.0   # [s] 

[Physics]
    g = 10.0                                      # Gravitational acceleration
    do_continuity = true                          # continuity equation
    do_q_equation = true                          # q momentum equation
    do_r_equation = true                          # r momentum equation
    do_convection = true                          # Include momentum convection term
    do_viscosity = true                          # Include momentum viscosity term
    do_bed_shear_stress = false                    # Include momentum bed shear stress term
    viscosity = 20.0
    chezy_coefficient = 50.0                      # Chezy coefficient

[Time]
    tunit  = "m"
    tstart = 0.0
    tstop  = 35.0
        